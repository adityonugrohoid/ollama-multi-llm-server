services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: ollama-multi-llm-server-api:latest
    container_name: llm-api
    ports:
      - "1080:8080"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEFAULT_MODEL=gemma2:2b
    networks:
      - default
      - ollama-network
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    image: ollama-multi-llm-server-ui:latest
    container_name: llm-ui
    ports:
      - "1501:8501"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

networks:
  ollama-network:
    external: true
    name: ollama-runtime-network
